name: Deploy

on:
  push:
    branches: [master]
    paths:
      - 'painel-caixa-escolar/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    needs: []
    defaults:
      run:
        working-directory: painel-caixa-escolar

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: painel-caixa-escolar/package-lock.json

      - run: npm ci

      - name: Run tests
        run: npm test

      # --force OBRIGATÓRIO: sem ele, o Vercel reaproveita o build-cache e republica a versão
      # ANTIGA (incidente 2026-06-24: prod regrediu de v43 → v24 + /api/* em 404). Este Actions
      # é um vetor de deploy SEPARADO da integração Git da Vercel — o 'vercel git disconnect'
      # NÃO o bloqueia. --force = build do zero, sempre a versão nova. NÃO REMOVER.
      - name: Deploy to Vercel (Production)
        run: npx vercel --prod --force --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
