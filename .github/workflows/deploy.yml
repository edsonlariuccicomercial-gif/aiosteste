name: Deploy

on:
  push:
    branches: [master]
    paths:
      - 'painel-caixa-escolar/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    needs: []
    defaults:
      run:
        working-directory: painel-caixa-escolar

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: painel-caixa-escolar/package-lock.json

      - run: npm ci

      - name: Run tests
        run: npm test

      - name: Deploy to Vercel (Production)
        run: npx vercel --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
