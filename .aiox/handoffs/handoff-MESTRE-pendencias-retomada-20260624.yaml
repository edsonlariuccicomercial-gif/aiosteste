  PENDENCIA_1_BLINDAGEM_QUOTA_LOCAL_PRIORIDADE_ALTA:
    titulo: "localStorage cheio ZERA a tela (mem:0) em vez de usar memória — bug raiz confirmado"
    diagnostico_confirmado: |
      No PC do usuário (angela computador A), o localStorage estava CHEIO (estourou quota ~5MB).
      Sintoma: list() baixa 171 NFs mas setItem falha por quota → loadData lê localStorage vazio →
      notasFiscais=0 em memória → tela 'Nenhuma nota fiscal'. Confirmado: mem:0, ls:0, emp:LARIUCCI, v46.
      localStorage.clear() + reload RESOLVEU (rebaixou tudo limpo do servidor; nem deslogou).
      Outro PC da mesma angela funcionava (localStorage saudável). PROVA que é quota local, não dados.
    fix_proposto:
      camada_A: "gdpApi já tem _memCache. Garantir que loadData()/renderNotasFiscais usem o _memCache quando o localStorage está vazio MAS o list() trouxe dados — nunca zerar a tela se há dados em memória/servidor."
      camada_B: "_stripNotaEntradaHeavy: remover XML/PDF embutido de gdp.notas-entrada.v1 (causa principal do entupimento) OU migrar notas-entrada para tabela Supabase dedicada."
      camada_C: "Quando setItem falhar por quota, fazer GC automático de chaves pesadas e RETENTAR, em vez de só pular (já há _safeSetItemSync que pula; falta o retry pós-GC)."
      camada_D: "Aviso ao usuário quando localStorage > 4.5MB (perto do limite) com botão 'limpar cache' seguro."
    arquivos: "gdp-core.js (loadData/_memCache/saveWrappedArray), gdp-api.js (_memCache), gdp-notas-fiscais.js (notas-entrada strip)."
    fluxo: "@analyst (confirmar _memCache atual) → @architect (desenhar fallback memória + strip) → @dev → @qa → @devops."

  PENDENCIA_2_MODULOS_STORY_22_2_RUNTIME:
    titulo: "Módulos: 'desmarca e remarca ao sair' — bug runtime NÃO resolvido"
    diagnostico_parcial: |
      Story 22.2 (persistência online) foi DEPLOYADA, mas o bug de RUNTIME que o usuário relatou
      ('desmarco radar/intel e ao sair remarca') NÃO foi concluído. Causa parcial identificada:
      index.html (onde fica a UI de config de módulos) NÃO chama hidratarAcessoModulosOnline() no boot.
      A config salva online (empresa_modulos no Supabase, validado) mas o index não hidrata.
    proximos_passos: "Verificar salvarModulos() em app-utils.js:286 (chama setAcessoModulos → gdpApi.modulos.save). Adicionar hidratarAcessoModulosOnline() no boot do index.html. Validar multi-device."
    fluxo: "@analyst → @architect → @dev → @qa → @devops."

