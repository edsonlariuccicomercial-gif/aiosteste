    hipotese_inicial: "Possível: conciliar 1 lançamento dispara um save/render que fecha o modal do extrato indevidamente, ou um estado de 'extrato conciliado' marcado cedo demais (1 de 63 já marca como concluído?). Investigar fluxo de conciliarLancamento + estado is_open do extrato."
