  FOLLOW_UP_CRITICO_para_dev:
    id: DEVOPS-1
    severidade: HIGH
    titulo: "_nfListaLeve (gdp-core.js:1993-2008) descarta updated_at -> DATA-FIX-B/C ineficazes"
    evidencia_producao: |
      Apos deploy, em producao: notasFiscais (RAM) 0/198 com updated_at; carimbei 198 manualmente +
      saveNotasFiscais(); reli o localStorage -> AINDA 0/198. O campo nao persiste.
    causa_raiz: |
      saveNotasFiscais (gdp-core.js:2082-2083) usa _nfListaLeve(nf), NAO _stripNfHeavy. _nfListaLeve
      (linhas 1993-2008) reconstroi o objeto com WHITELIST explicita de campos e NAO inclui
      updated_at/updatedAt. Logo todo save no localStorage descarta o relogio. O carimbo de boot
      (DATA-FIX-B) e apagado no primeiro save; o loadData seguinte le sem o campo -> RAM nasce sem
      relogio de novo. Loop. A revisao estatica (@qa QA-5) olhou _stripNfHeavy, mas o save real usa
      _nfListaLeve — ponto cego que so a validacao na tela pegou.
    fix_proposto: |
      Em _nfListaLeve (gdp-core.js:1994), adicionar ao objeto retornado:
        updated_at: nf.updated_at || nf.updatedAt || nf.emitidaEm || (nf.audit && nf.audit.authorizedAt),
        updatedAt: nf.updated_at || nf.updatedAt || nf.emitidaEm || (nf.audit && nf.audit.authorizedAt),
      (1-2 linhas). Tambem conferir _ultraLightNf (faz Object.assign — provavelmente preserva, validar).
      Bumpar gdp-core.js ?v no HTML. Redeploy.
    impacto_atual: |
      BAIXO-MEDIO no curto prazo: a protecao PRINCIPAL contra perda de dados e o FIX-4 por PROVA
      (chave+protocolo), que NAO depende do updated_at e ESTA funcionando. O updated_at e a 2a linha
      de defesa (desempate temporal entre dois registros AMBOS com prova, ou tabelas sem prova).
      Enquanto o ralo do _nfListaLeve nao for tampado, o desempate por relogio das NFs fica degradado,
      mas notas autorizadas nao regridem (prova as protege). Tampar fecha 100%.

  veredito_deploy: |
    DEPLOY BEM-SUCEDIDO e ESTAVEL. As 3 causas-raiz principais estao corrigidas e no ar:
    (1) label por prova (nao mais 'pisca'), (2) merge por prova (nao regride), (3) autocura 656 (NSU
