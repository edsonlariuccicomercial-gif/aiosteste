      - "_DELETE_KEYS += produtos:'gdp.produtos.deleted.v1' (tombstone)"
    gdp-core.js (v61):
      - "GDP_SYNC_KEYS += 'gdp.produtos.deleted.v1'"
    gdp-banco-produtos.js (v18):
      - "saveBancoProdutos: delega a ProductStore.save por item (-> gdpApi.produtos.save tabela + markUserEdit). Fallback setItem+markUserEdit se store ausente. NAO chama schedulCloudSync p/ produtos."
      - "excluirProduto/excluirProdutosSelecionados/limparTodoBancoProdutos: delegam a ProductStore.remove (-> gdpApi.produtos.remove tabela + tombstone). Antes zeravam so o localStorage (causa do 'volta no boot')."
      - "salvarProduto/criarProdutoRapido/confirmarImportacaoTiny: cobertos via saveBancoProdutos"
      - "sanitizeBancoProduto: comentario D-6 reforcado (SKU estavel; LICT-*/BANK-* preservados)"
    product-store.js (v2):
      - "save -> _pushToTable (gdpApi.produtos.save); remove -> _removeFromTable (gdpApi.produtos.remove)"
      - "persist() registra gdpMarkUserEdit('gdp.produtos.v1')"
      - "toCanonical confirmado: preserva sku e id (nao quebra vinculo)"
    gdp-init.js (v60):
      - "Backfill one-shot: se tabela produtos vazia mas local N>0, gdpApi.produtos.saveAll (respeita tombstone). Fail-soft."
    HTML:
      - "gdp-contratos.html: gdp-api v26, gdp-core v61, product-store v2, gdp-banco-produtos v18, gdp-init v60"
      - "index.html: gdp-api v26, product-store v2"
  validacoes_feitas:
