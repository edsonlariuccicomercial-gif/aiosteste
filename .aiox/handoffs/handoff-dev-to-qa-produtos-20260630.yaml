    status: "IMPLEMENTADO; aguardando validacao QA na tela logado"
  implementado:
    gdp-api.js (v26):
      - "CAMEL_TO_SNAKE += custoBase/precoReferencia/margemAlvo/produtoCritico/unidadeBase/dadosExtras"
      - "TABLE_COLS.produtos += 'dados_extras'"
      - "mapToTable: wrap dos campos ricos (custosFornecedor,concorrentes,propostas,historicoResultados,precoReferenciaHistorico,taxaConversao,embalagem_descricao,criadoEm) em dados_extras — isolado p/ table==='produtos'"
