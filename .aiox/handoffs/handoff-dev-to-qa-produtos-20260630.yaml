    - "PRE-REQ: @devops aplica migration 041 + deploy --force; usuario Ctrl+Shift+R"
    - "1. Cadastrar produto novo -> reload (F5) -> produto PERMANECE"
    - "2. Excluir produto -> reload -> NAO volta"
    - "3. Editar produto (custo/preco/NCM) -> reload -> alteracoes persistem (incl. campos ricos em dados_extras)"
    - "4. Vincular item de contrato a produto (skuVinculado) -> reload -> vinculo intacto; SKU nao muda"
    - "5. Multi-sessao: cadastrar na sessao A, abrir sessao B (outra maquina/aba anonima) -> produto aparece"
    - "6. Conferir no Supabase: SELECT count(*) FROM produtos; bate com a tela"
