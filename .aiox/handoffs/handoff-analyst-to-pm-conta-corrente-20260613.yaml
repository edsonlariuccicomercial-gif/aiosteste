    epic: "EPIC-20 (Ajustes Financeiro GDP)"
  problem_summary: >
    Escolas em regime de conta-corrente (ex: Valadares) faturam nota cheia paga
    adiantado, retiram itens parcialmente e o restante fica como crédito rotativo.
    Outras recebem e pagam em parcelas. GDP não tem conceito de saldo rotativo por
    cliente — controle em Excel se perde. Solução: extrato de conta-corrente por
    cliente (crédito/débito, saldo automático por valor).
  decisions:
    - "D1: Resolver dentro do GDP (não Excel)"
    - "D3: Saldo calculado por VALOR (R$) = Σcréditos − Σdébitos, nunca digitado"
    - "D4 (CORRIGIDA): Crédito NÃO é automático cego. Entra só por decisão manual no pedido, ANTES de faturar (botão). Escolas têm vários contratos; nota pode ser entregue em parte com restante indo pro crédito."
    - "D5+D6: Débito manual com itens detalhados do catálogo ARP, campos editáveis + avulso"
    - "D7: Demonstrativo com impressão/PDF para prestação de contas"
    - "D9: Botão oferece 2 formas — digitar valor OU marcar itens entregues (resto vai pro crédito)"
    - "D10: NF emitida pelo valor TOTAL; crédito é controle interno; retiradas NÃO geram nova NF"
    - "D11 (PRINCÍPIO): nada vai pro crédito sem o usuário decidir. Usuário: 'se for tudo no automático, vamos nos perder.'"
