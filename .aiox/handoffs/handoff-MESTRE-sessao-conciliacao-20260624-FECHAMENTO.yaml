  empresa: LARIUCCI (validado logado como lariucci, gdp-contratos.html → Caixa → Conciliação)
  url: "https://painel-caixa-escolar.vercel.app"
  metodo_validacao: "Playwright logado + inspecionar localStorage/Supabase. Banco SEMPRE íntegro — validar TELA. Deploy SEMPRE `cd painel-caixa-escolar && npx vercel --prod --force --yes`. Ctrl+Shift+R após cada deploy."

  ESTADO_PRODUCAO_FINAL:
    versoes_no_ar:
      gdp-core: v52
      gdp-api: v24
      gdp-realtime: v13
      gdp-pedidos: v31
