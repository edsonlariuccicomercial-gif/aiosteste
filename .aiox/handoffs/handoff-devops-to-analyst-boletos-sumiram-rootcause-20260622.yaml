    observacao_chave: >
      Os boletos reais ESTAO no Supabase (nao foram deletados do banco). Se sumiram da TELA
      do usuario sem deleted_at, o mais provavel e SOBRESCRITA de sessao/sync (a conta voltou
      ao estado anterior SEM o providerChargeId) e nao remocao. Investigar o caminho realtime
      UPDATE + self-echo.

  pistas_de_codigo_para_o_analyst:
    - "gdp-api.js:25-39 — _selfEchoes / gdpApiIsSelfEcho: TTL 8s, assinatura por _echoSignature(row). Se a assinatura nao bater (ex.: campos reordenados, save em voo durante 404), o eco do proprio save NAO e suprimido e e tratado como UPDATE de outro cliente."
    - "gdp-realtime.js:167-236 — dirty window (5s) + sobrescrita condicionada a timestamp ESTRITO (rTs > lTs). Se o boleto foi salvo e logo depois chegou um UPDATE com dado antigo (sem providerChargeId) mas updated_at maior, sobrescreveria a conta SEM o boleto."
    - "gdp-api.js:352 saveAll faz UPSERT (nao deleta). gdp-core.js:1073 _pushNetworkSave chama saveAll(items) — envia a LISTA INTEIRA. Investigar corrida: se duas abas/saves concorrentes salvaram listas diferentes (uma com boleto, outra sem), o ultimo save vence e pode ter sobrescrito a versao com boleto."
    - "gdp-notas-fiscais.js:633-644 — auto-sync agendado 8s apos create. Durante 404, o create podia ter salvo a conta SEM providerChargeId e o auto-sync (tambem 404) nao preencheu. Cruzar com o timing dos saves."

  pergunta_aberta_ao_usuario:
    - "Os boletos sumiram da aba Contas a Receber ou da aba Notas Fiscais?"
    - "Houve F5 / troca de maquina / outra aba aberta entre ver os boletos e eles sumirem?"

  next_action: "@analyst conduz a investigacao de causa raiz (sobrescrita por sync/realtime e' a hipotese principal). Confirmar com timestamps no Supabase (updated_at das contas vs criacao do boleto) e revisar self-echo. Quando a causa for confirmada, devolver ao @devops apenas se precisar de deploy do fix."
