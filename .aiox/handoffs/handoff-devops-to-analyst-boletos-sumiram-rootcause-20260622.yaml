  consumed: true
  title: "Investigar causa raiz: boletos Inter APARECERAM e SUMIRAM da conta a receber (sem acao do usuario)."

  contexto:
    relato_usuario:
      - "Gerou varios boletos Inter hoje; eles APARECERAM no sistema (confirmado: usuario pegou copia dos boletos no app do Inter)."
      - "Depois SUMIRAM da conta a receber. Sobraram apenas 2 marcados com Inter."
      - "Usuario NEGA ter clicado em 'Gerar Nota Fiscal' novamente em qualquer pedido."
      - "Usuario NAO quer recuperar os boletos — quer ENTENDER A CAUSA e CORRIGIR para nunca mais acontecer."

  o_que_ja_foi_resolvido_pelo_devops:
    - "Infra: functions /api/* estavam em 404 (includeFiles em vercel.json, commit 455d0c1) — RESOLVIDO."
    - "Infra: auto-deploy do Git sobrescrevia o --force (vercel git disconnect) — RESOLVIDO."
