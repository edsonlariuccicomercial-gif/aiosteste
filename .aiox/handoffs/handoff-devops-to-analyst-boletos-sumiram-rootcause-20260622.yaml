    - hipotese: "Regeracao de NF apaga conta+boleto cegamente (gdp-notas-fiscais.js:1148)"
      status: "ENFRAQUECIDA — usuario NEGA ter regerado. Botao 'Gerar NF' so aparece quando NAO ha NF (gdp-pedidos.js:1403). Guard aplicado mesmo assim (defensivo), mas provavelmente NAO e a causa real."
    - hipotese: "SOBRESCRITA por realtime/sync do Supabase (self-echo failure / dirty window)"
      status: "EM ABERTO — HIPOTESE MAIS PROVAVEL. Investigar."

  dados_confirmados_supabase:
    total_contas_receber: 187
    boletos_inter_reais_no_banco: 5
    ids_boletos_reais:
      - "CR-20260619-42169 (chargeId c1364ea1..., nossoNum 90752858954, pdf SIM)"
      - "CR-20260622-91069 (chargeId e02f6f79..., pdf SIM) — CRIADA HOJE"
      - "CR-20260619-94240 (chargeId 899761b4..., nossoNum 90752856339, pdf SIM)"
      - "CR-20260611-32388 (chargeId b6452b6a..., nossoNum 90752872286, pdf SIM)"
