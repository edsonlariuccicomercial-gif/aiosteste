    - "Guard regerar/excluir NF nao apaga conta com boleto real — commit 1da6c89 (HIPOTESE, ver abaixo)."

  hipoteses_levantadas_e_status:
    - hipotese: "Estado fantasma (boleto nunca emitiu no Inter)"
      status: "DESCARTADA — usuario confirmou que os boletos existem no Inter."
    - hipotese: "Exclusao manual / soft-delete"
