  contexto_usuario: |
    - angela e lariucci são 2 usuários da MESMA empresa (LARIUCCI). Comportamento esperado.
    - Usuário CÉTICO (com razão): já dissemos 'sync resolvido na raiz' várias vezes e o problema voltou.
      Estávamos corrigindo sintomas (carimbão, quota, deploy) sem atacar a raiz do RENDER/sync entre máquinas.
