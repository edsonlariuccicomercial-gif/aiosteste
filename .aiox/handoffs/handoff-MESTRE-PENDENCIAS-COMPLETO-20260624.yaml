      ref: "docs/architecture/ADR-002-unificacao-central-produtos.md (APROVADO 2026-06-06) + handoff-analyst-P3-central-produtos-fase4-pendente-20260624.yaml. SEGUIR o ADR, NÃO redesenhar."

