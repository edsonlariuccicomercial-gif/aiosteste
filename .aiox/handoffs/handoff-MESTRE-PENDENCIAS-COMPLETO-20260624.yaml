      detalhe: "sync_data já desabilitado no boot (Story 4.83, gdp-init.js:3250). Ainda usado p/ keys auxiliares (radar/intel/estoque/config) e produtos via GDP_SYNC_KEYS. Aposentar JUNTO da unificação de produtos (P4). Para conciliação/extratos, blobs já ignorados (ADR-003) mas ainda em GDP_SYNC_KEYS — remover de vez após estabilidade."

