  validação end-to-end no navegador confirma: chave que estoura é pulada, NFs baixam corretas, sync
  normal preservado. Aprovado para deploy. Strip do notas-entrada fica como melhoria de longo prazo.

next_action: "@devops (codex/.codex/agents/devops.md): commit + push + deploy --force; validar em prod (ou orientar usuário) que 'Atualizar da Nuvem' baixa NFs mesmo com localStorage cheio."
