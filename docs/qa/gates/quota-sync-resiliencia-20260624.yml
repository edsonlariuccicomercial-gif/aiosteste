  acceptance_criteria: PASS # quota não aborta mais o sync; NFs baixam; validado no browser
  no_regressions: PASS     # sync normal grava OK (_safeSetItemSync retorna true com espaço); result inicializado evita undefined
  performance: PASS        # GC preventivo libera espaço; menos risco de estouro
  security: PASS           # sem mudança de auth/dados; helper não mascara erros não-quota
  documentation: PASS      # comentários anti-quota inline; handoffs completos

