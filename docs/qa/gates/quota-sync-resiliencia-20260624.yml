storyId: "INCIDENTE-quota-sync-resiliencia"
title: "Resiliência a QuotaExceededError no forcarSyncCompleto"
gateDate: "2026-06-24"
reviewer: "@qa (Quinn)"
verdict: CONCERNS

summary: >
  Fix sólido e validado end-to-end no navegador. PASS com CONCERNS: a resiliência a quota funciona
  (chave que estoura é pulada, NFs baixam mesmo assim) e o sync normal não regrediu. A ressalva é
  a validação no PC específico do usuário (localStorage cheio) pós-deploy.

