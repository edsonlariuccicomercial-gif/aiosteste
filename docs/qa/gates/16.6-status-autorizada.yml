adversarial_findings:
  - "Coerência de flags: grep confirma 0 refs soltas a result.parsed?.autorizado — todas viraram _isAutorizado (recomendação @po 100%)."
  - "Regressão de label transmitida->transmissao_realizada: gdp-pedidos.js L1584 (.includes transmit) ainda casa; L1638 (igualdade exata) NAO casa -> nota cai em 'pendente'. COMPORTAMENTO CORRETO (nota sem prova deve ser reconsultada, nao exibida como Emitida). Melhoria, nao regressao."
  - "FIX-2 da 16.5 (extracao de numero da chNFe) coerente: autorizado agora exige chNFe, entao a extracao sempre tem chave."

