summary: >
  Correção precisa e bem feita. Invariante "autorizada exige prot+chNFe" implementado
  na origem (transmitirHomologacaoNota), impedindo o nascimento de notas falso-autorizadas
  (fantasmas não-excluíveis). Recomendação do @po atendida 100% — flag única _isAutorizado
  substitui todas as 5 refs a result.parsed?.autorizado (grep confirma 0 soltas). 204/204
  testes (re-executados pelo QA). Análise adversarial confirmou que a mudança de label
  transmitida→transmissao_realizada MELHORA o fluxo (nota sem prova vai para 'Pendente',
  exigindo reconsulta, em vez de mascarar como 'Emitida'). Veredito CONCERNS por 3 itens
  LOW não-bloqueantes.

