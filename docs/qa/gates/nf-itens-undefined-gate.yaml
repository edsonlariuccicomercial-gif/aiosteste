issue_obrigatorio:
  - id: RECUPERACAO-CAMPO-QTD
    severity: HIGH
    local: "gdp-notas-fiscais.js — bloco de RECUPERACAO (nf.itens = pedido.itens.map(...)), campo 'quantidade: pi.quantidade'"
    problema: >
      A NF reconstruida usa a chave 'quantidade' com valor 'pi.quantidade', MAS:
      (1) o item do PEDIDO usa 'qtd' (NAO 'quantidade') — confirmado: 19 ocorrencias de qtd:, zero de quantidade: em gdp-pedidos.js. Logo pi.quantidade e UNDEFINED.
      (2) os itens da NF (nf.itens) sao lidos como 'i.qtd' em TODO o codigo (linhas 2681, 2702, 2710, 2726, 2857, 3112 — DANFE, totais, payload email/SEFAZ).
      Resultado: a NF recuperada nasce com qtd=undefined -> DANFE/total com quantidade vazia e a SEFAZ REJEITA (backend exige quantidade > 0, nfe-sefaz-client.js:1557).
    fix_exato: >
      Trocar na reconstrucao: usar a chave 'qtd' (nao 'quantidade') e ler de pi.qtd.
      Ex.: { descricao:..., ncm:..., unidade:..., sku:..., qtd: pi.qtd, precoUnitario: (pi.precoUnitario != null ? pi.precoUnitario : pi.valorUnitario) }.
      Conferir tambem se algum consumidor precisa de itemNum (pedido tem itemNum) — opcional incluir itemNum: pi.itemNum.

veredito: >
  CONCERNS. O anti-crash esta correto e pode ir para producao (resolve o erro do usuario). POReM o
  caminho de RECUPERACAO produz NF com quantidade invalida (campo errado). Como a recuperacao e
  justamente o cenario do usuario (NF sem itens, pedido com itens), o fix do campo qtd e OBRIGATORIO
  antes do deploy — senao o erro de crash vira erro de rejeicao SEFAZ. Voltar ao @dev.

next_action: "@dev corrigir RECUPERACAO-CAMPO-QTD (quantidade->qtd, pi.quantidade->pi.qtd); re-validar; @devops deploy --force"

