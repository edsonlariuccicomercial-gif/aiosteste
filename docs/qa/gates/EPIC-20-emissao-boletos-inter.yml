  Liberado para @devops com nota de configuração de env vars de certificado.

deploy_validacao_producao:
  data: "2026-06-14"
  achado_deploy:
    id: DEPLOY-01
    severidade: CRITICAL
    titulo: "Endpoint editado pela cadeia (squads/.../api/gdp-integrations.js, ESM) NÃO é o servido em /api/* (raiz, CommonJS)"
    causa_raiz: >
      Dois gdp-integrations.js divergentes. A função deployada (api/gdp-integrations.js raiz)
      é CommonJS e só trata NF-e; não consegue require() dos clients de cobrança ESM.
      Por isso a emissão Inter (e todo o fluxo de cobrança ESM) nunca foi acessível em produção.
    correcao: >
      Criado api/bank-charge.js (CommonJS auto-contido, provider Inter via https.request+mTLS),
      rota dedicada /api/bank-charge, registrado em vercel.json. Commit 7b2679b.
    status: RESOLVIDO
  testes_producao:
    - "POST /api/bank-charge {provider:inter} → 'Credenciais OAuth do Inter ausentes' (código novo no ar; não mais Unknown action). PASS"
    - "POST /api/bank-charge {provider:c6} → stub claro 'aguardando homologacao'. PASS"
    - "GET home → HTTP 200, sem regressão. PASS"
  deployment: "painel-caixa-escolar-pysytm8mo (Skipping build cache). Aliased: painel-caixa-escolar.vercel.app"
  pendencia_usuario: "Configurar env vars GDP_BANK_INTER_* na Vercel para emissão real."
