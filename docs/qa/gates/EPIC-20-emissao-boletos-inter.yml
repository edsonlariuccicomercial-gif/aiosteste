achados:
  - id: QA-01
    severidade: CRITICAL
    titulo: "fetch(undici) ignora opção `agent` — certificado mTLS do Inter não seria aplicado"
    evidencia: >
      Node 24 usa fetch global (undici), que não aceita `agent` (opção do node-fetch);
      usa `dispatcher`. O precedente do projeto para mTLS é nfe-sefaz-client.js:323
      (https.request + https.Agent, CommonJS). fetch(..,{agent}) falharia o handshake TLS.
    acao: auto_fix
    correcao: >
      Reescrito inter-charge-client.js para usar https.request() nativo com https.Agent
      (cert/key PEM), espelhando o precedente do SEFAZ. Removido fetch para chamadas mTLS.
    status: RESOLVIDO

  - id: QA-02
    severidade: MEDIUM
    titulo: "Precedência de operador no campo pix (|| antes de ?:)"
    evidencia: "linha 150: pix.pixCopiaECola || pix.txid ? {...} : null — funciona mas é ilegível."
    acao: auto_fix
    correcao: "Adicionado parênteses explícitos: (pix.pixCopiaECola || pix.txid) ? {...} : null"
    status: RESOLVIDO

  - id: QA-03
    severidade: LOW
    titulo: "Inconsistência de module system (ESM import vs commonjs no diretório)"
    evidencia: "dashboard/package.json é type:commonjs; nfe-sefaz usa require; novos arquivos usavam import."
    acao: auto_fix
    correcao: "Convertido inter/c6-charge-client e mantida compatibilidade — ver nota de deploy."
    status: RESOLVIDO

verificacoes:
  idempotencia:
    resultado: PASS
    nota: "seuNumero=conta.id rastreável; emissão iniciada por usuário (1 por lançamento). Sem duplicação automática."
  seguranca_credenciais:
    resultado: PASS
    nota: "Cert/secret resolvidos server-side via resolveProviderRuntimeConfig (env vars). Nada no front."
  regressao_asaas:
    resultado: PASS
    nota: "createAsaasCharge/syncAsaasCharge/webhooks intactos; dispatch por mapa preserva caminho asaas."
  c6_stub:
    resultado: PASS
    nota: "Falha com mensagem clara apontando ADR e provider inter. Não bloqueia."
  sintaxe:
    resultado: PASS
    nota: "node --check em todos os módulos após fix."

verdict: PASS
justificativa: >
