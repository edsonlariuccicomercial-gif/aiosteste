            - "Lines 1047-1050: Remove SKU priority logic (skuVinculado > auto > empty)"
            - "Cloud sync: ensure produto_vinculado_id is synced"
        - path: "painel-caixa-escolar/squads/caixa-escolar/dashboard/js/gdp-contratos-module.js"
