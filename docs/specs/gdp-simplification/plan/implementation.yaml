# ============================================================
# TESTING STRATEGY
# ============================================================

testing:
  per_wave:
    - "Smoke test: all existing pages load without JS errors"
    - "Portal escolar: verify sgd-proxy, sync-pedidos, sync-entregas untouched"
    - "NF-e: verify preview generates correct XML fields"
    - "Login: verify auth flow unchanged"

  regression:
    - "Full GDP flow: contrato → pedido → NF"
    - "Portal escolar → pedido sync"
    - "Financial modules (contas pagar/receber) unchanged"
    - "Entregas flow"
    - "Dashboard KPIs load correctly"

  production_validation:
    - "Deploy each wave to Vercel"
    - "Test at https://painel-caixa-escolar.vercel.app"
    - "Verify Supabase migration applied"
    - "Check browser console for errors"

# ============================================================
# RISK MITIGATION
# ============================================================

risk_mitigation:
  - strategy: "Wave-based deployment — each wave independently deployable and testable"
  - backup: "Git commits per wave — easy rollback to previous wave"
  - data_safety: "Migration 014 is additive only (ALTER TABLE, CREATE TABLE) — no data destruction"
  - portal_safety: "sgd-proxy.js, sync-pedidos.js, sync-entregas.js NEVER touched"
  - demanda_removal: "FR-008 split into 3 sub-tasks (UI → data → estoque) per critique recommendation"
