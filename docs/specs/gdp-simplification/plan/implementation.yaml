# ============================================================
# WAVE 2 — Contrato ≠ Produto + Vinculacao Manual
# ============================================================

wave_2:
  name: "Contrato/Produto Separation + Manual Linking"
  frs: [FR-004, FR-005, FR-006, FR-019]
  risk: MEDIUM
  estimated_effort: "4-6 hours"
  deploy_independently: true
  prerequisite: wave_1

  tasks:
    - id: W2-T1
      title: "Migration 014: Schema changes"
      type: database
      files:
        - path: "painel-caixa-escolar/supabase/migrations/014_gdp_simplification.sql"
          action: CREATE
          content: |
            -- Produto: campos para produto_critico (Wave 4, but adding now)
            ALTER TABLE produtos ADD COLUMN IF NOT EXISTS produto_critico boolean DEFAULT false;
            ALTER TABLE produtos ADD COLUMN IF NOT EXISTS unidade_base text;
            ALTER TABLE produtos ADD COLUMN IF NOT EXISTS embalagens jsonb DEFAULT '[]'::jsonb;

            -- Estoque simplificado
            CREATE TABLE IF NOT EXISTS estoque_simples (
              produto_id uuid PRIMARY KEY REFERENCES produtos(id),
              empresa_id text NOT NULL DEFAULT current_setting('app.empresa_id', true),
              quantidade_atual numeric DEFAULT 0,
              updated_at timestamptz DEFAULT now()
            );
            ALTER TABLE estoque_simples ENABLE ROW LEVEL SECURITY;
            CREATE POLICY estoque_simples_empresa ON estoque_simples
              USING (empresa_id = current_setting('app.empresa_id', true));
            CREATE TRIGGER set_updated_at_estoque_simples
              BEFORE UPDATE ON estoque_simples
              FOR EACH ROW EXECUTE FUNCTION update_updated_at();
      verification:
        - "supabase db push — migration applies without errors"
        - "supabase migration list — shows 014"
        - "Verify ALTER TABLE on produtos succeeds"
        - "Verify estoque_simples table created with RLS"

    - id: W2-T2
      title: "FR-004/FR-006: Contrato item structure — remove SKU, add produto_vinculado_id"
      type: frontend
      files:
