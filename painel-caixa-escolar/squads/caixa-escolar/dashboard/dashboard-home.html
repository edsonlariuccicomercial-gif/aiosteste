<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Licit-AIX — Dashboard</title>
  <link rel="stylesheet" href="styles.css?v=7" />
  <style>
    :root{--bg:#0f172a;--bg-soft:#1e293b;--card:#1e293b;--line:#334155;--text:#f1f5f9;--muted:#94a3b8}
    body::before,body::after{display:none}
    /* KPI Cards */
    .home-layout{display:grid;grid-template-columns:1fr 1fr;gap:2rem;align-items:center}
    .kpi-grid-home{display:grid;grid-template-columns:1fr;gap:1rem;margin-bottom:0}
    .kpi-card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:1.2rem;cursor:pointer;transition:all .3s;position:relative;overflow:hidden}
    .kpi-card:hover{transform:translateY(-4px);box-shadow:0 12px 40px rgba(0,0,0,.3)}
    .kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
    .kpi-card.radar::before{background:linear-gradient(90deg,#06b6d4,#3b82f6)}
    .kpi-card.intel::before{background:linear-gradient(90deg,#f59e0b,#22c55e)}
    .kpi-card.gdp::before{background:linear-gradient(90deg,#8b5cf6,#3b82f6)}
    .kpi-icon{font-size:2rem;margin-bottom:.8rem}
    .kpi-label-home{font-size:.75rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.4rem}
    .kpi-value-home{font-size:2rem;font-weight:800;margin-bottom:.3rem}
    .kpi-sub-home{font-size:.8rem;color:var(--muted)}
    .kpi-card.radar .kpi-value-home{color:#06b6d4}
    .kpi-card.intel .kpi-value-home{color:#22c55e}
    .kpi-card.gdp .kpi-value-home{color:#8b5cf6}

    /* Map Section */
    .map-section{text-align:center;margin-bottom:0}
    .map-section h2{font-size:.85rem;color:var(--muted);margin-bottom:.8rem;text-transform:uppercase;letter-spacing:.08em}
    .map-wrapper{position:relative;width:480px;height:400px;margin:0 auto}
    .map-wrapper img{width:100%;height:100%;object-fit:contain;filter:brightness(0.92) saturate(1.1);border-radius:12px}
    .sre-marker{position:absolute;transform:translate(-50%,-50%);cursor:pointer;z-index:2;transition:all .2s}
    .sre-marker .dot{width:14px;height:14px;border-radius:50%;border:2px solid rgba(255,255,255,.9);box-shadow:0 0 8px rgba(0,0,0,.4)}
    .sre-marker .dot.active{animation:pulseMarker 2s infinite;box-shadow:0 0 12px currentColor}
    .sre-marker .dot.inactive{opacity:.25;border-color:rgba(255,255,255,.3)}
    .sre-marker .label{position:absolute;left:50%;transform:translateX(-50%);bottom:calc(100% + 4px);font-size:.6rem;font-weight:700;color:#fff;white-space:nowrap;text-shadow:0 1px 4px rgba(0,0,0,.8);pointer-events:none;opacity:0;transition:opacity .2s}
    .sre-marker:hover .label{opacity:1}
    .sre-marker:hover .dot{transform:scale(1.4)}
    .sre-marker .badge{position:absolute;left:50%;transform:translateX(-50%);top:calc(100% + 2px);font-size:.55rem;font-weight:700;color:var(--accent);white-space:nowrap;pointer-events:none}
    @keyframes pulseMarker{0%,100%{box-shadow:0 0 4px currentColor}50%{box-shadow:0 0 16px currentColor,0 0 24px currentColor}}
    .map-legend{display:flex;gap:1rem;justify-content:center;margin-top:.5rem;font-size:.7rem;color:var(--muted)}
    .map-legend span{display:flex;align-items:center;gap:4px}
    .map-legend .leg-dot{width:8px;height:8px;border-radius:50%;border:1.5px solid #fff}

    /* SRE Detail Panel */
    .sre-panel{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:var(--card);border:1px solid var(--line);border-radius:16px;padding:2rem;width:400px;max-width:90vw;z-index:100;box-shadow:0 20px 60px rgba(0,0,0,.5);display:none}
    .sre-panel.active{display:block}
    .sre-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:99;display:none}
    .sre-overlay.active{display:block}
    .sre-panel h3{font-size:1.1rem;margin-bottom:1rem;display:flex;align-items:center;gap:.5rem}
    .sre-stat{display:flex;justify-content:space-between;padding:.6rem 0;border-bottom:1px solid var(--line);font-size:.85rem}
    .sre-stat:last-child{border:none}
    .sre-stat .val{font-weight:700;color:var(--accent)}
    .sre-panel .btn-go{margin-top:1rem;width:100%;padding:.7rem;border:none;background:var(--accent);color:#0d1412;border-radius:8px;font-size:.85rem;font-weight:700;cursor:pointer}
    .sre-panel .btn-go:hover{opacity:.85}
    .sre-panel .btn-close{position:absolute;top:.8rem;right:.8rem;background:none;border:none;color:var(--muted);font-size:1.2rem;cursor:pointer}

    /* Animations */
    .fade-in{opacity:0;transform:translateY(20px);animation:fadeUp .6s ease forwards}
    .fade-in:nth-child(2){animation-delay:.15s}
    .fade-in:nth-child(3){animation-delay:.3s}
    @keyframes fadeUp{to{opacity:1;transform:translateY(0)}}

    /* Viewport fit — no scroll */
    .main-area{height:100vh;overflow:hidden;display:flex;flex-direction:column}
    .main-area .topbar{flex-shrink:0}
    .main-area > div[style]{flex:1;display:flex;flex-direction:column;justify-content:center;overflow:hidden;padding:1rem 2rem!important}

    /* Responsive */
    @media(max-width:768px){
      .home-layout{grid-template-columns:1fr}
      .kpi-grid-home{grid-template-columns:1fr}
      .map-wrapper{width:300px!important;height:250px!important}
    }
    @media(min-width:769px) and (max-width:1024px){
      .map-wrapper{width:380px!important;height:320px!important}
    }
  </style>
</head>
<body>

  <!-- ===== SIDEBAR ===== -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand" style="cursor:pointer" onclick="window.location.href='dashboard-home.html'" title="Voltar ao Dashboard">Licit-AIX</div>
    <nav class="sidebar-nav">
      <button class="sidebar-item active" onclick="void(0)" title="Dashboard Home">
        <span class="sidebar-icon">🏠</span>
        <span class="sidebar-label">HOME</span>
      </button>
      <button class="sidebar-item" data-module="radar" onclick="window.location.href='index.html';localStorage.setItem('nexedu.activeModule','radar')" title="Radar de Oportunidades">
        <span class="sidebar-icon">📡</span>
        <span class="sidebar-label">RADAR</span>
      </button>
      <button class="sidebar-item" data-module="intel-precos" onclick="window.location.href='index.html';localStorage.setItem('nexedu.activeModule','intel-precos')" title="Inteligência de Preços">
        <span class="sidebar-icon">💰</span>
        <span class="sidebar-label">INTEL PREÇOS</span>
      </button>
      <button class="sidebar-item" data-module="gdp" onclick="window.location.href='gdp-contratos.html'" title="Gestão de Pedidos Pós-Licitação">
        <span class="sidebar-icon">📦</span>
        <span class="sidebar-label">GDP</span>
      </button>
    </nav>
    <button class="sidebar-item sidebar-config" onclick="window.location.href='index.html';localStorage.setItem('nexedu.activeModule','config')" title="Configurações">
      <span class="sidebar-icon">⚙️</span>
      <span class="sidebar-label">Configurações</span>
    </button>
  </aside>

  <!-- ===== MAIN AREA ===== -->
  <div class="main-area" id="main-area">

    <!-- ===== TOPBAR ===== -->
    <header class="topbar">
      <div class="topbar-left">
        <button class="sidebar-toggle" id="sidebar-toggle" title="Menu">☰</button>
        <div>
          <p class="eyebrow">Dashboard</p>
          <h1>Licit-AIX</h1>
        </div>
      </div>
      <div class="topbar-right">
        <span id="user-name" style="color:var(--muted);font-size:.85rem"></span>
        <button class="btn btn-sm" onclick="logout()" title="Sair">Sair</button>
      </div>
    </header>

    <!-- ===== CONTENT ===== -->
    <div style="padding:1rem 2rem;">

      <div class="home-layout">
        <!-- Map Section — esquerda -->
        <div class="map-section">
          <h2>Mapa de Atuação — SREs Minas Gerais</h2>
          <div class="map-wrapper" id="map-wrapper">
            <img src="img/mapa-sres-mg.webp" alt="Mapa SREs Minas Gerais" draggable="false" />
            <div id="sre-markers"></div>
          </div>
          <div class="map-legend">
            <span><span class="leg-dot" style="background:#22c55e"></span> Ativa</span>
            <span><span class="leg-dot" style="background:#555"></span> Inativa</span>
          </div>
        </div>

        <!-- KPI Cards — coluna vertical a direita -->
        <div class="kpi-grid-home" id="kpi-grid"></div>
      </div>

    </div>
  </div>

  <!-- SRE Detail Panel -->
  <div class="sre-overlay" id="sre-overlay" onclick="fecharSrePanel()"></div>
  <div class="sre-panel" id="sre-panel">
    <button class="btn-close" onclick="fecharSrePanel()">✕</button>
    <h3 id="sre-panel-title"></h3>
    <div id="sre-panel-stats"></div>
    <button class="btn-go" id="sre-panel-go">Ir para Radar desta SRE →</button>
  </div>

  <!-- Sidebar overlay (mobile) -->
  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <script src="auth.js"></script>
  <script>
// ===== CONFIG =====
const MODULOS_KEY = "nexedu.modulos.acesso";
// Story 8.14: Dynamic SRE_CONFIG from user's active SREs (not hardcoded)
const SRE_COLORS = ["#3b82f6","#f59e0b","#ef4444","#22c55e","#a855f7","#06b6d4","#ec4899","#f97316","#14b8a6","#8b5cf6","#6366f1","#84cc16"];
const SRE_CONFIG = (function() {
  let sresAtivas = [];
  try {
    const emp = JSON.parse(localStorage.getItem("nexedu.empresa") || "{}");
    if (Array.isArray(emp.sresAtivas) && emp.sresAtivas.length > 0) sresAtivas = emp.sresAtivas;
  } catch(_) {}
  if (sresAtivas.length === 0) sresAtivas = ["uberaba", "uberlandia", "passos"];
  // Lookup full names from SRE_CONFIGS if available (loaded from app-state.js via index.html)
  const ALL_SRES = typeof SRE_CONFIGS !== 'undefined' ? SRE_CONFIGS : [];
  return sresAtivas.map((id, i) => {
    const cfg = ALL_SRES.find(s => s.id === id);
    const nome = cfg ? "SRE " + cfg.nome : "SRE " + id.charAt(0).toUpperCase() + id.slice(1).replace(/-/g, " ");
    return { id, nome, cor: SRE_COLORS[i % SRE_COLORS.length], x: 30 + (i * 8) % 50, y: 35 + (i * 7) % 40, escolas: 0, oportunidades: 0 };
  });
})();

// ===== SIDEBAR TOGGLE =====
const sidebar = document.getElementById("sidebar");
const sidebarOverlay = document.getElementById("sidebar-overlay");
document.getElementById("sidebar-toggle").addEventListener("click", () => {
  sidebar.classList.toggle("open");
  sidebarOverlay.classList.toggle("active");
});
sidebarOverlay.addEventListener("click", () => {
  sidebar.classList.remove("open");
  sidebarOverlay.classList.remove("active");
});

// ===== ACCESS CONTROL =====
function getAcessoModulos() {
  try {
    const raw = localStorage.getItem(MODULOS_KEY);
    if (raw) return JSON.parse(raw);
  } catch(_) {}
  return { radar: true, intelPrecos: true, gdp: true };
}

function aplicarAcessoSidebar() {
  const acesso = getAcessoModulos();
  document.querySelectorAll(".sidebar-item[data-module]").forEach(btn => {
    const mod = btn.dataset.module;
    if (mod === "radar") btn.style.display = acesso.radar ? "" : "none";
    if (mod === "intel-precos") btn.style.display = acesso.intelPrecos ? "" : "none";
    if (mod === "gdp") btn.style.display = acesso.gdp ? "" : "none";
  });
}

// ===== KPIs =====
function carregarKPIs() {
  const acesso = getAcessoModulos();
  const grid = document.getElementById("kpi-grid");
  const brl = new Intl.NumberFormat("pt-BR", { style: "currency", currency: "BRL" });
  let cards = '';

  function readWrappedArray(key) {
    try {
      const parsed = JSON.parse(localStorage.getItem(key) || "null");
      if (Array.isArray(parsed)) return parsed;
      if (parsed && Array.isArray(parsed.items)) return parsed.items;
      if (parsed && Array.isArray(parsed.data)) return parsed.data;
    } catch(_) {}
    return [];
  }

  // Radar — mesma logica do modulo Radar: orcamentos com status "aberto"
  let oportunidades = 0;
  try {
    const orc = JSON.parse(localStorage.getItem("caixaescolar.orcamentos") || "[]");
    if (Array.isArray(orc)) oportunidades = orc.filter(o => o.status === "aberto").length;
  } catch(_) {}

  if (acesso.radar) {
    cards += `<div class="kpi-card radar fade-in" onclick="window.location.href='index.html';localStorage.setItem('nexedu.activeModule','radar')">
      <div class="kpi-icon">📡</div>
      <div class="kpi-label-home">Radar de Oportunidades</div>
      <div class="kpi-value-home">${oportunidades}</div>
      <div class="kpi-sub-home">oportunidades ativas</div>
    </div>`;
  }

  // Intel Preços
  let faturamento = 0;
  try {
    const contratos = readWrappedArray("caixaescolar.contratos.v1");
    if (Array.isArray(contratos)) faturamento = contratos.reduce((s, c) => s + (c.valorTotal || c.valor || 0), 0);
  } catch(_) {}

  if (acesso.intelPrecos) {
    cards += `<div class="kpi-card intel fade-in" onclick="window.location.href='index.html';localStorage.setItem('nexedu.activeModule','intel-precos')">
      <div class="kpi-icon">💰</div>
      <div class="kpi-label-home">Inteligência de Preços</div>
      <div class="kpi-value-home">${brl.format(faturamento)}</div>
      <div class="kpi-sub-home">faturamento aprovado</div>
    </div>`;
  }

  // GDP
  let gdpContratos = 0, gdpValor = 0;
  try {
    const gdp = readWrappedArray("gdp.contratos.v1");
    if (Array.isArray(gdp)) {
      const ativos = gdp.filter(c => c.status === 'ativo');
      gdpContratos = ativos.length;
      gdpValor = ativos.reduce((s, c) => {
        if (c.valorTotal) return s + c.valorTotal;
        return s + (c.itens || []).reduce((t, i) => t + (i.precoUnitario || 0) * (i.qtdContratada || i.quantidade || 0), 0);
      }, 0);
    }
  } catch(_) {}

  if (acesso.gdp) {
    cards += `<div class="kpi-card gdp fade-in" onclick="window.location.href='gdp-contratos.html'">
      <div class="kpi-icon">📦</div>
      <div class="kpi-label-home">GDP Contratos</div>
      <div class="kpi-value-home">${gdpContratos} <span style="font-size:.9rem;color:var(--muted)">/ ${brl.format(gdpValor)}</span></div>
      <div class="kpi-sub-home">contratos ativos / valor total</div>
    </div>`;
  }

  grid.innerHTML = cards || '<p style="text-align:center;color:var(--muted);grid-column:1/-1">Nenhum módulo liberado. Configure o acesso em Configurações.</p>';

  // Story 8.14: Update SRE data from orcamentos — match by sre field OR escola name
  try {
    const orcs = JSON.parse(localStorage.getItem("caixaescolar.orcamentos") || "[]");
    SRE_CONFIG.forEach(sre => {
      const sreOrcs = orcs.filter(o => {
        const orcSre = (o.sre || "").toLowerCase().replace(/\s+/g, "-");
        return orcSre === sre.id || orcSre.includes(sre.id);
      });
      sre.oportunidades = sreOrcs.length;
      const escolasSre = new Set(sreOrcs.map(o => o.escola).filter(Boolean));
      sre.escolas = escolasSre.size;
    });
    // Distribute unmatched budgets to "all active SREs" count
    const matchedIds = new Set(SRE_CONFIG.flatMap(sre =>
      orcs.filter(o => (o.sre || "").toLowerCase().replace(/\s+/g, "-") === sre.id).map(o => o.id)
    ));
    const unmatched = orcs.filter(o => !matchedIds.has(o.id) && o.status === "aberto");
    if (unmatched.length > 0 && SRE_CONFIG.length > 0) {
      // Add unmatched to total oportunidades displayed in KPI (already counted above)
      gdpLog && gdpLog(`[Home] ${unmatched.length} orçamentos sem SRE específica (aceitos via SGD network)`);
    }
  } catch(_) {}
}

// ===== INTERACTIVE MAP — SRE Markers =====
// Coordenadas % (x, y) de cada SRE sobre a imagem do mapa de MG
// Posições aproximadas baseadas no mapa oficial das SREs
const SRE_MAP_POS = {
  "almenara":                 { x: 80, y: 27 },
  "aracuai":                  { x: 72, y: 25 },
  "barbacena":                { x: 63, y: 72 },
  "campo-belo":               { x: 47, y: 72 },
  "carangola":                { x: 80, y: 60 },
  "caratinga":                { x: 73, y: 52 },
  "caxambu":                  { x: 55, y: 82 },
  "conselheiro-lafaiete":     { x: 58, y: 67 },
  "coronel-fabriciano":       { x: 68, y: 50 },
  "curvelo":                  { x: 51, y: 42 },
  "diamantina":               { x: 59, y: 32 },
  "divinopolis":              { x: 45, y: 62 },
  "governador-valadares":     { x: 75, y: 43 },
  "guanhaes":                 { x: 65, y: 40 },
  "itajuba":                  { x: 55, y: 88 },
  "ituiutaba":                { x: 16, y: 48 },
  "janauba":                  { x: 54, y: 12 },
  "januaria":                 { x: 42, y: 13 },
  "juiz-de-fora":             { x: 70, y: 73 },
  "leopoldina":               { x: 77, y: 67 },
  "manhuacu":                 { x: 76, y: 56 },
  "metropolitana-a":          { x: 55, y: 56 },
  "metropolitana-b":          { x: 52, y: 55 },
  "metropolitana-c":          { x: 54, y: 52 },
  "monte-carmelo":            { x: 28, y: 42 },
  "montes-claros":            { x: 49, y: 22 },
  "muriae":                   { x: 77, y: 62 },
  "nova-era":                 { x: 62, y: 50 },
  "ouro-preto":               { x: 59, y: 60 },
  "para-de-minas":            { x: 47, y: 53 },
  "paracatu":                 { x: 25, y: 30 },
  "passos":                   { x: 35, y: 72 },
  "patos-de-minas":           { x: 32, y: 40 },
  "patrocinio":               { x: 30, y: 48 },
  "pirapora":                 { x: 44, y: 30 },
  "pocos-de-caldas":          { x: 40, y: 82 },
  "ponte-nova":               { x: 67, y: 56 },
  "pouso-alegre":             { x: 47, y: 88 },
  "sao-joao-del-rei":         { x: 55, y: 70 },
  "sao-sebastiao-do-paraiso": { x: 34, y: 78 },
  "sete-lagoas":              { x: 51, y: 48 },
  "teofilo-otoni":            { x: 79, y: 35 },
  "uba":                      { x: 72, y: 63 },
  "uberaba":                  { x: 22, y: 58 },
  "uberlandia":               { x: 20, y: 52 },
  "unai":                     { x: 22, y: 22 },
  "varginha":                 { x: 44, y: 78 },
};

function renderMapMarkers() {
  const container = document.getElementById("sre-markers");
  if (!container) return;

  const activeIds = new Set(SRE_CONFIG.map(s => s.id));

  // All 47 SREs as markers
  let html = '';
  for (const [id, pos] of Object.entries(SRE_MAP_POS)) {
    const isActive = activeIds.has(id);
    const sre = SRE_CONFIG.find(s => s.id === id);
    const color = sre ? sre.cor : '#555';
    const nome = id.split("-").map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(" ");
    const oport = sre ? sre.oportunidades : 0;

    html += `<div class="sre-marker" style="left:${pos.x}%;top:${pos.y}%" data-sre-id="${id}" onclick="clickSreMarker('${id}')">
      <div class="dot ${isActive ? 'active' : 'inactive'}" style="background:${color};color:${color}"></div>
      <div class="label">${nome}${oport > 0 ? ' (' + oport + ')' : ''}</div>
      ${isActive && oport > 0 ? '<div class="badge">' + oport + '</div>' : ''}
    </div>`;
  }
  container.innerHTML = html;
}

function clickSreMarker(id) {
  const sre = SRE_CONFIG.find(s => s.id === id);
  if (sre) {
    abrirSrePanel(sre);
  } else {
    // SRE not in active config — show basic info
    const nome = "SRE " + id.split("-").map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(" ");
    abrirSrePanel({ id, nome, cor: '#555', escolas: 0, oportunidades: 0 });
  }
}

function abrirSrePanel(sre) {
  document.getElementById("sre-panel-title").innerHTML = `<span style="display:inline-block;width:12px;height:12px;border-radius:50%;background:${sre.cor}"></span> ${sre.nome}`;
  document.getElementById("sre-panel-stats").innerHTML = `
    <div class="sre-stat"><span>Escolas cadastradas</span><span class="val">${sre.escolas}</span></div>
    <div class="sre-stat"><span>Oportunidades ativas</span><span class="val">${sre.oportunidades}</span></div>
  `;
  document.getElementById("sre-panel-go").onclick = () => {
    localStorage.setItem("nexedu.activeModule", "radar");
    window.location.href = "index.html";
  };
  document.getElementById("sre-overlay").classList.add("active");
  document.getElementById("sre-panel").classList.add("active");
}

function fecharSrePanel() {
  document.getElementById("sre-overlay").classList.remove("active");
  document.getElementById("sre-panel").classList.remove("active");
}

// ===== LOGOUT =====
function logout() {
  sessionStorage.removeItem("ce.auth");
  window.location.href = "login.html";
}

// ===== INIT =====
try {
  const emp = JSON.parse(localStorage.getItem("nexedu.empresa") || "{}");
  document.getElementById("user-name").textContent = emp.nome || "Fornecedor";
} catch(_) {
  document.getElementById("user-name").textContent = "Fornecedor";
}

aplicarAcessoSidebar();
carregarKPIs();
renderMapMarkers();
  </script>
</body>
</html>
