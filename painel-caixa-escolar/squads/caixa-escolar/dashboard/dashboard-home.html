<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Licit-AIX — Dashboard</title>
  <link rel="stylesheet" href="styles.css?v=7" />
  <style>
    :root{--bg:#0f172a;--bg-soft:#1e293b;--card:#1e293b;--line:#334155;--text:#f1f5f9;--muted:#94a3b8}
    body::before,body::after{display:none}
    /* KPI Cards */
    .kpi-grid-home{display:grid;grid-template-columns:repeat(3,1fr);gap:1.5rem;margin-bottom:3rem}
    .kpi-card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:1.8rem;cursor:pointer;transition:all .3s;position:relative;overflow:hidden}
    .kpi-card:hover{transform:translateY(-4px);box-shadow:0 12px 40px rgba(0,0,0,.3)}
    .kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
    .kpi-card.radar::before{background:linear-gradient(90deg,#06b6d4,#3b82f6)}
    .kpi-card.intel::before{background:linear-gradient(90deg,#f59e0b,#22c55e)}
    .kpi-card.gdp::before{background:linear-gradient(90deg,#8b5cf6,#3b82f6)}
    .kpi-icon{font-size:2rem;margin-bottom:.8rem}
    .kpi-label-home{font-size:.75rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.4rem}
    .kpi-value-home{font-size:2rem;font-weight:800;margin-bottom:.3rem}
    .kpi-sub-home{font-size:.8rem;color:var(--muted)}
    .kpi-card.radar .kpi-value-home{color:#06b6d4}
    .kpi-card.intel .kpi-value-home{color:#22c55e}
    .kpi-card.gdp .kpi-value-home{color:#8b5cf6}

    /* Globe Section */
    .globe-section{text-align:center;margin-bottom:2rem}
    .globe-section h2{font-size:1rem;color:var(--muted);margin-bottom:1.5rem;text-transform:uppercase;letter-spacing:.08em}

    /* SRE Detail Panel */
    .sre-panel{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:var(--card);border:1px solid var(--line);border-radius:16px;padding:2rem;width:400px;max-width:90vw;z-index:100;box-shadow:0 20px 60px rgba(0,0,0,.5);display:none}
    .sre-panel.active{display:block}
    .sre-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:99;display:none}
    .sre-overlay.active{display:block}
    .sre-panel h3{font-size:1.1rem;margin-bottom:1rem;display:flex;align-items:center;gap:.5rem}
    .sre-stat{display:flex;justify-content:space-between;padding:.6rem 0;border-bottom:1px solid var(--line);font-size:.85rem}
    .sre-stat:last-child{border:none}
    .sre-stat .val{font-weight:700;color:var(--accent)}
    .sre-panel .btn-go{margin-top:1rem;width:100%;padding:.7rem;border:none;background:var(--accent);color:#0d1412;border-radius:8px;font-size:.85rem;font-weight:700;cursor:pointer}
    .sre-panel .btn-go:hover{opacity:.85}
    .sre-panel .btn-close{position:absolute;top:.8rem;right:.8rem;background:none;border:none;color:var(--muted);font-size:1.2rem;cursor:pointer}

    /* Animations */
    .fade-in{opacity:0;transform:translateY(20px);animation:fadeUp .6s ease forwards}
    .fade-in:nth-child(2){animation-delay:.15s}
    .fade-in:nth-child(3){animation-delay:.3s}
    @keyframes fadeUp{to{opacity:1;transform:translateY(0)}}

    /* Responsive */
    @media(max-width:768px){
      .kpi-grid-home{grid-template-columns:1fr}
      #globe-wrapper,#globe-canvas{width:280px!important;height:280px!important}
    }
    @media(min-width:769px) and (max-width:1024px){
      .kpi-grid-home{grid-template-columns:repeat(2,1fr)}
      #globe-wrapper,#globe-canvas{width:340px!important;height:340px!important}
    }
  </style>
</head>
<body>

  <!-- ===== SIDEBAR ===== -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand" style="cursor:pointer" onclick="window.location.href='dashboard-home.html'" title="Voltar ao Dashboard">Licit-AIX</div>
    <nav class="sidebar-nav">
      <button class="sidebar-item active" onclick="void(0)" title="Dashboard Home">
        <span class="sidebar-icon">🏠</span>
        <span class="sidebar-label">HOME</span>
      </button>
      <button class="sidebar-item" data-module="radar" onclick="window.location.href='index.html';localStorage.setItem('nexedu.activeModule','radar')" title="Radar de Oportunidades">
        <span class="sidebar-icon">📡</span>
        <span class="sidebar-label">RADAR</span>
      </button>
      <button class="sidebar-item" data-module="intel-precos" onclick="window.location.href='index.html';localStorage.setItem('nexedu.activeModule','intel-precos')" title="Inteligência de Preços">
        <span class="sidebar-icon">💰</span>
        <span class="sidebar-label">INTEL PREÇOS</span>
      </button>
      <button class="sidebar-item" data-module="gdp" onclick="window.location.href='gdp-contratos.html'" title="Gestão de Pedidos Pós-Licitação">
        <span class="sidebar-icon">📦</span>
        <span class="sidebar-label">GDP</span>
      </button>
    </nav>
    <button class="sidebar-item sidebar-config" onclick="window.location.href='index.html';localStorage.setItem('nexedu.activeModule','config')" title="Configurações">
      <span class="sidebar-icon">⚙️</span>
      <span class="sidebar-label">Configurações</span>
    </button>
  </aside>

  <!-- ===== MAIN AREA ===== -->
  <div class="main-area" id="main-area">

    <!-- ===== TOPBAR ===== -->
    <header class="topbar">
      <div class="topbar-left">
        <button class="sidebar-toggle" id="sidebar-toggle" title="Menu">☰</button>
        <div>
          <p class="eyebrow">Dashboard</p>
          <h1>Licit-AIX</h1>
        </div>
      </div>
      <div class="topbar-right">
        <span id="user-name" style="color:var(--muted);font-size:.85rem"></span>
        <button class="btn btn-sm" onclick="logout()" title="Sair">Sair</button>
      </div>
    </header>

    <!-- ===== CONTENT ===== -->
    <div style="padding:1.5rem 2rem;">

      <!-- KPI Cards -->
      <div class="kpi-grid-home" id="kpi-grid"></div>

      <!-- Globe Section — Interactive Canvas -->
      <div class="globe-section">
        <h2>Áreas de Atuação — SREs</h2>
        <div style="position:relative;width:420px;height:420px;margin:0 auto" id="globe-wrapper">
          <canvas id="globe-canvas" style="width:420px;height:420px;cursor:grab"></canvas>
        </div>
      </div>

    </div>
  </div>

  <!-- SRE Detail Panel -->
  <div class="sre-overlay" id="sre-overlay" onclick="fecharSrePanel()"></div>
  <div class="sre-panel" id="sre-panel">
    <button class="btn-close" onclick="fecharSrePanel()">✕</button>
    <h3 id="sre-panel-title"></h3>
    <div id="sre-panel-stats"></div>
    <button class="btn-go" id="sre-panel-go">Ir para Radar desta SRE →</button>
  </div>

  <!-- Sidebar overlay (mobile) -->
  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <script src="auth.js"></script>
  <script>
// ===== CONFIG =====
const MODULOS_KEY = "nexedu.modulos.acesso";
const SRE_CONFIG = [
  { id: "uberaba", nome: "SRE Uberaba", cor: "#3b82f6", x: 55, y: 45, escolas: 0, oportunidades: 0 },
  { id: "uberlandia", nome: "SRE Uberlândia", cor: "#f59e0b", x: 40, y: 55, escolas: 0, oportunidades: 0 },
  { id: "passos", nome: "SRE Passos", cor: "#ef4444", x: 65, y: 60, escolas: 0, oportunidades: 0 },
];

// ===== SIDEBAR TOGGLE =====
const sidebar = document.getElementById("sidebar");
const sidebarOverlay = document.getElementById("sidebar-overlay");
document.getElementById("sidebar-toggle").addEventListener("click", () => {
  sidebar.classList.toggle("open");
  sidebarOverlay.classList.toggle("active");
});
sidebarOverlay.addEventListener("click", () => {
  sidebar.classList.remove("open");
  sidebarOverlay.classList.remove("active");
});

// ===== ACCESS CONTROL =====
function getAcessoModulos() {
  try {
    const raw = localStorage.getItem(MODULOS_KEY);
    if (raw) return JSON.parse(raw);
  } catch(_) {}
  return { radar: true, intelPrecos: true, gdp: true };
}

function aplicarAcessoSidebar() {
  const acesso = getAcessoModulos();
  document.querySelectorAll(".sidebar-item[data-module]").forEach(btn => {
    const mod = btn.dataset.module;
    if (mod === "radar") btn.style.display = acesso.radar ? "" : "none";
    if (mod === "intel-precos") btn.style.display = acesso.intelPrecos ? "" : "none";
    if (mod === "gdp") btn.style.display = acesso.gdp ? "" : "none";
  });
}

// ===== KPIs =====
function carregarKPIs() {
  const acesso = getAcessoModulos();
  const grid = document.getElementById("kpi-grid");
  const brl = new Intl.NumberFormat("pt-BR", { style: "currency", currency: "BRL" });
  let cards = '';

  function readWrappedArray(key) {
    try {
      const parsed = JSON.parse(localStorage.getItem(key) || "null");
      if (Array.isArray(parsed)) return parsed;
      if (parsed && Array.isArray(parsed.items)) return parsed.items;
      if (parsed && Array.isArray(parsed.data)) return parsed.data;
    } catch(_) {}
    return [];
  }

  // Radar — mesma logica do modulo Radar: orcamentos com status "aberto"
  let oportunidades = 0;
  try {
    const orc = JSON.parse(localStorage.getItem("caixaescolar.orcamentos") || "[]");
    if (Array.isArray(orc)) oportunidades = orc.filter(o => o.status === "aberto").length;
  } catch(_) {}

  if (acesso.radar) {
    cards += `<div class="kpi-card radar fade-in" onclick="window.location.href='index.html';localStorage.setItem('nexedu.activeModule','radar')">
      <div class="kpi-icon">📡</div>
      <div class="kpi-label-home">Radar de Oportunidades</div>
      <div class="kpi-value-home">${oportunidades}</div>
      <div class="kpi-sub-home">oportunidades ativas</div>
    </div>`;
  }

  // Intel Preços
  let faturamento = 0;
  try {
    const contratos = readWrappedArray("caixaescolar.contratos.v1");
    if (Array.isArray(contratos)) faturamento = contratos.reduce((s, c) => s + (c.valorTotal || c.valor || 0), 0);
  } catch(_) {}

  if (acesso.intelPrecos) {
    cards += `<div class="kpi-card intel fade-in" onclick="window.location.href='index.html';localStorage.setItem('nexedu.activeModule','intel-precos')">
      <div class="kpi-icon">💰</div>
      <div class="kpi-label-home">Inteligência de Preços</div>
      <div class="kpi-value-home">${brl.format(faturamento)}</div>
      <div class="kpi-sub-home">faturamento aprovado</div>
    </div>`;
  }

  // GDP
  let gdpContratos = 0, gdpValor = 0;
  try {
    const gdp = readWrappedArray("gdp.contratos.v1");
    if (Array.isArray(gdp)) {
      const ativos = gdp.filter(c => c.status === 'ativo');
      gdpContratos = ativos.length;
      gdpValor = ativos.reduce((s, c) => {
        if (c.valorTotal) return s + c.valorTotal;
        return s + (c.itens || []).reduce((t, i) => t + (i.precoUnitario || 0) * (i.qtdContratada || i.quantidade || 0), 0);
      }, 0);
    }
  } catch(_) {}

  if (acesso.gdp) {
    cards += `<div class="kpi-card gdp fade-in" onclick="window.location.href='gdp-contratos.html'">
      <div class="kpi-icon">📦</div>
      <div class="kpi-label-home">GDP Contratos</div>
      <div class="kpi-value-home">${gdpContratos} <span style="font-size:.9rem;color:var(--muted)">/ ${brl.format(gdpValor)}</span></div>
      <div class="kpi-sub-home">contratos ativos / valor total</div>
    </div>`;
  }

  grid.innerHTML = cards || '<p style="text-align:center;color:var(--muted);grid-column:1/-1">Nenhum módulo liberado. Configure o acesso em Configurações.</p>';

  // Update SRE data from orcamentos
  try {
    const orcs = JSON.parse(localStorage.getItem("caixaescolar.orcamentos") || "[]");
    const pre = JSON.parse(localStorage.getItem("caixaescolar.preorcamentos.v1") || "{}");
    SRE_CONFIG.forEach(sre => {
      const sreNome = sre.id.charAt(0).toUpperCase() + sre.id.slice(1); // "Uberaba", "Uberlandia", "Passos"
      const sreOrcs = orcs.filter(o => (o.sre || "").toLowerCase() === sre.id);
      sre.oportunidades = sreOrcs.length;
      const escolasSre = new Set(sreOrcs.map(o => o.escola).filter(Boolean));
      sre.escolas = escolasSre.size;
    });
  } catch(_) {}
}

// ===== INTERACTIVE GLOBE (Canvas) =====
const globeState = {
  rotY: 0.4, rotX: 0.15, drag: { active: false, sx: 0, sy: 0, ry: 0, rx: 0, moved: false },
  mouse: { x: -9999, y: -9999, over: false }, hovered: null, time: 0, dots: [], markers: []
};

// Fibonacci sphere dots
(function initDots() {
  const n = 1200, gr = (1 + Math.sqrt(5)) / 2;
  for (let i = 0; i < n; i++) {
    const theta = (2 * Math.PI * i) / gr;
    const phi = Math.acos(1 - (2 * (i + 0.5)) / n);
    globeState.dots.push([Math.cos(theta) * Math.sin(phi), Math.cos(phi), Math.sin(theta) * Math.sin(phi)]);
  }
})();

function latLngToXYZ(lat, lng, r) {
  const phi = ((90 - lat) * Math.PI) / 180;
  const theta = ((lng + 180) * Math.PI) / 180;
  return [-(r * Math.sin(phi) * Math.cos(theta)), r * Math.cos(phi), r * Math.sin(phi) * Math.sin(theta)];
}
function gRotY(x, y, z, a) { return [x * Math.cos(a) + z * Math.sin(a), y, -x * Math.sin(a) + z * Math.cos(a)]; }
function gRotX(x, y, z, a) { return [x, y * Math.cos(a) - z * Math.sin(a), y * Math.sin(a) + z * Math.cos(a)]; }
function gProject(x, y, z, cx, cy) { const s = 700 / (700 + z); return [x * s + cx, y * s + cy]; }

// Map SRE_CONFIG to globe sections
// Coordenadas reais de cada SRE
const SRE_COORDS = {
  uberaba: { lat: -19.75, lng: -47.93 },
  uberlandia: { lat: -18.91, lng: -48.27 },
  passos: { lat: -20.72, lng: -46.61 },
};
const GLOBE_SECTIONS = SRE_CONFIG.map((sre, i) => ({
  num: String(i + 1).padStart(2, '0'), label: sre.nome, color: sre.cor,
  lat: (SRE_COORDS[sre.id] || SRE_COORDS.uberaba).lat,
  lng: (SRE_COORDS[sre.id] || SRE_COORDS.uberaba).lng,
  sre
}));

function drawGlobe() {
  const canvas = document.getElementById("globe-canvas");
  if (!canvas) return;
  const ctx = canvas.getContext("2d");
  const dpr = window.devicePixelRatio || 1;
  const w = canvas.clientWidth, h = canvas.clientHeight;
  canvas.width = w * dpr; canvas.height = h * dpr;
  ctx.scale(dpr, dpr);

  const cx = w / 2, cy = h / 2, radius = Math.min(w, h) * 0.42;
  const gs = globeState;

  if (!gs.drag.active) gs.rotY += 0.0016;
  gs.time += 0.015;

  ctx.clearRect(0, 0, w, h);

  // Background glow
  const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, radius * 1.2);
  grad.addColorStop(0, 'rgba(153,51,255,0.06)');
  grad.addColorStop(0.5, 'rgba(0,229,255,0.03)');
  grad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = grad; ctx.fillRect(0, 0, w, h);

  // Outer ring
  ctx.beginPath(); ctx.arc(cx, cy, radius, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(0,229,255,0.05)'; ctx.lineWidth = 1; ctx.stroke();

  const ry = gs.rotY, rx = gs.rotX;

  // Background dots with repel effect
  for (const [bx, by, bz] of gs.dots) {
    let [x, y, z] = [bx * radius, by * radius, bz * radius];
    [x, y, z] = gRotX(x, y, z, rx);
    [x, y, z] = gRotY(x, y, z, ry);
    if (z > 0) continue;

    let [sx, sy] = gProject(x, y, z, cx, cy);
    if (gs.mouse.over) {
      const dx = sx - gs.mouse.x, dy = sy - gs.mouse.y;
      const d = Math.sqrt(dx * dx + dy * dy);
      if (d < 85 && d > 0) { const f = ((85 - d) / 85) ** 1.6; sx += (dx / d) * f * 26; sy += (dy / d) * f * 26; }
    }

    const depth = Math.max(0.08, 1 - (z + radius) / (2 * radius));
    const dotR = 0.85 + depth * 0.85;
    const r2 = Math.round((1 - depth) * 80), g2 = Math.round(229 * depth), b2 = Math.round(255 * depth + (1 - depth) * 180);
    ctx.beginPath(); ctx.arc(sx, sy, dotR, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${r2},${g2},${b2},${(depth * 0.8 + 0.1).toFixed(2)})`; ctx.fill();
  }

  // SRE markers
  gs.markers = [];
  for (const sec of GLOBE_SECTIONS) {
    let [x, y, z] = latLngToXYZ(sec.lat, sec.lng, radius);
    [x, y, z] = gRotX(x, y, z, rx);
    [x, y, z] = gRotY(x, y, z, ry);
    if (z > -radius * 0.18) continue;

    const [sx, sy] = gProject(x, y, z, cx, cy);
    gs.markers.push({ sx, sy, sec });

    const isHov = gs.hovered === sec.num;
    const pulse = Math.sin(gs.time * 2.2 + sec.lat * 0.3) * 0.5 + 0.5;

    // Pulsing rings
    ctx.beginPath(); ctx.arc(sx, sy, 18 + pulse * 10, 0, Math.PI * 2);
    ctx.strokeStyle = sec.color + (isHov ? '55' : '22'); ctx.lineWidth = isHov ? 1.5 : 1; ctx.stroke();
    ctx.beginPath(); ctx.arc(sx, sy, 26 + pulse * 6, 0, Math.PI * 2);
    ctx.strokeStyle = sec.color + (isHov ? '28' : '0c'); ctx.lineWidth = 1; ctx.stroke();

    // Dot + number
    const dotR = isHov ? 8 : 6;
    ctx.beginPath(); ctx.arc(sx, sy, dotR, 0, Math.PI * 2);
    ctx.fillStyle = sec.color; ctx.shadowColor = sec.color; ctx.shadowBlur = isHov ? 16 : 8; ctx.fill(); ctx.shadowBlur = 0;

    ctx.font = `bold ${isHov ? '11' : '9'}px monospace`;
    ctx.fillStyle = isHov ? '#fff' : sec.color + 'dd'; ctx.textAlign = 'center';
    ctx.fillText(sec.label.replace('SRE ', ''), sx, sy - 14);
  }

  requestAnimationFrame(drawGlobe);
}

// Globe interaction events
function initGlobeEvents() {
  const canvas = document.getElementById("globe-canvas");
  if (!canvas) return;
  const gs = globeState;

  canvas.addEventListener("pointerdown", (e) => {
    gs.drag = { active: true, sx: e.clientX, sy: e.clientY, ry: gs.rotY, rx: gs.rotX, moved: false };
    canvas.setPointerCapture(e.pointerId);
    canvas.style.cursor = 'grabbing';
  });

  canvas.addEventListener("pointermove", (e) => {
    const rect = canvas.getBoundingClientRect();
    gs.mouse = { x: e.clientX - rect.left, y: e.clientY - rect.top, over: true };

    // Hit test markers
    let found = null;
    for (const mp of gs.markers) {
      const dx = mp.sx - gs.mouse.x, dy = mp.sy - gs.mouse.y;
      if (Math.sqrt(dx * dx + dy * dy) < 30) { found = mp.sec.num; break; }
    }
    gs.hovered = found;
    if (!gs.drag.active) canvas.style.cursor = found ? 'pointer' : 'grab';

    if (!gs.drag.active) return;
    const ddx = e.clientX - gs.drag.sx, ddy = e.clientY - gs.drag.sy;
    if (Math.sqrt(ddx * ddx + ddy * ddy) > 3) gs.drag.moved = true;
    gs.rotY = gs.drag.ry + ddx * 0.005;
    gs.rotX = Math.max(-1, Math.min(1, gs.drag.rx + ddy * 0.005));
  });

  canvas.addEventListener("pointerup", (e) => {
    canvas.style.cursor = 'grab';
    if (!gs.drag.moved) {
      const rect = canvas.getBoundingClientRect();
      const mx = e.clientX - rect.left, my = e.clientY - rect.top;
      for (const mp of gs.markers) {
        const dx = mp.sx - mx, dy = mp.sy - my;
        if (Math.sqrt(dx * dx + dy * dy) < 34) { abrirSrePanel(mp.sec.sre); break; }
      }
    }
    gs.drag.active = false;
  });

  canvas.addEventListener("pointerleave", () => { gs.mouse.over = false; gs.hovered = null; });
}

function renderGlobePoints() {
  initGlobeEvents();
  requestAnimationFrame(drawGlobe);
}

function abrirSrePanel(sre) {
  document.getElementById("sre-panel-title").innerHTML = `<span style="display:inline-block;width:12px;height:12px;border-radius:50%;background:${sre.cor}"></span> ${sre.nome}`;
  document.getElementById("sre-panel-stats").innerHTML = `
    <div class="sre-stat"><span>Escolas cadastradas</span><span class="val">${sre.escolas}</span></div>
    <div class="sre-stat"><span>Oportunidades ativas</span><span class="val">${sre.oportunidades}</span></div>
  `;
  document.getElementById("sre-panel-go").onclick = () => {
    localStorage.setItem("nexedu.activeModule", "radar");
    window.location.href = "index.html";
  };
  document.getElementById("sre-overlay").classList.add("active");
  document.getElementById("sre-panel").classList.add("active");
}

function fecharSrePanel() {
  document.getElementById("sre-overlay").classList.remove("active");
  document.getElementById("sre-panel").classList.remove("active");
}

// ===== LOGOUT =====
function logout() {
  sessionStorage.removeItem("ce.auth");
  window.location.href = "login.html";
}

// ===== INIT =====
try {
  const emp = JSON.parse(localStorage.getItem("nexedu.empresa") || "{}");
  document.getElementById("user-name").textContent = emp.nome || "Fornecedor";
} catch(_) {
  document.getElementById("user-name").textContent = "Fornecedor";
}

aplicarAcessoSidebar();
carregarKPIs();
renderGlobePoints();
  </script>
</body>
</html>
