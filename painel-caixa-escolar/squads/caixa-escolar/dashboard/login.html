<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Licit-AIX</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    .login-container { width: 100%; max-width: 380px; }
    .login-card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 32px 28px;
      backdrop-filter: blur(12px);
      text-align: center;
    }
    .login-card h1 {
      font-size: 1.3rem;
      margin-bottom: 4px;
    }
    .login-card .eyebrow { margin-bottom: 24px; }
    .login-input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--line);
      border-radius: 6px;
      color: var(--text);
      padding: 10px 12px;
      font-size: 0.9rem;
      outline: none;
      margin-bottom: 12px;
      transition: border-color 0.2s;
    }
    .login-input:focus { border-color: var(--accent); }
    .login-btn {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      background: var(--accent);
      color: #0d1412;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .login-btn:hover { opacity: 0.85; }
    .login-error {
      color: var(--danger);
      font-size: 0.8rem;
      margin-top: 12px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <p class="eyebrow">Painel do Fornecedor</p>
      <h1>Licit-AIX</h1>
      <p style="color:#94a3b8;font-size:0.85rem;margin-top:0.3rem;line-height:1.4;font-style:italic;">Inteligência comercial para fornecedores da educação pública</p>
      <form id="login-form" style="margin-top:24px;">
        <input type="text" class="login-input" id="login-user" placeholder="Usuário ou Email" autocomplete="username" required />
        <input type="password" class="login-input" id="login-pass" placeholder="Senha" autocomplete="current-password" required />
        <button type="submit" class="login-btn" id="login-btn">Entrar</button>
        <p class="login-error" id="login-error"></p>
      </form>
    </div>
  </div>

  <script src="js/supabase-config.js"></script>
  <script src="js/supabase-auth.js?v=4"></script>
  <script>
    // Story 7.2: Supabase Auth login with legacy fallback
    const LEGACY_AUTH = {
      user: "lariucci",
      passHash: "b01b3ce6c2432fe67e535235bd985a787557c9584b56c70e855abad11d0bd871",
      sessionKey: "ce.auth",
    };

    const DASHBOARD_URL = "gdp-contratos.html";

    // Already logged in? Check Supabase session first, then legacy
    (async function checkExistingSession() {
      const session = await window.gdpAuth.getSession();
      if (session) {
        window.location.href = DASHBOARD_URL;
        return;
      }
      // Legacy check (will be removed after full migration)
      if (sessionStorage.getItem(LEGACY_AUTH.sessionKey) === LEGACY_AUTH.passHash) {
        window.location.href = DASHBOARD_URL;
      }
    })();

    async function sha256(text) {
      if (window.crypto && crypto.subtle) {
        const data = new TextEncoder().encode(text);
        const buf = await crypto.subtle.digest("SHA-256", data);
        return Array.from(new Uint8Array(buf)).map((b) => b.toString(16).padStart(2, "0")).join("");
      }
      return sha256Fallback(text);
    }

    // External HTTP previews are not a secure context, so Web Crypto may be unavailable.
    function sha256Fallback(text) {
      const rightRotate = (value, amount) => (value >>> amount) | (value << (32 - amount));
      const maxWord = Math.pow(2, 32);
      const words = [];
      const hash = sha256Fallback.hash = sha256Fallback.hash || [];
      const k = sha256Fallback.k = sha256Fallback.k || [];
      let primeCounter = k.length;
      const isComposite = {};
      const ascii = unescape(encodeURIComponent(text));
      let result = "";

      if (!primeCounter) {
        for (let candidate = 2; primeCounter < 64; candidate++) {
          if (isComposite[candidate]) continue;
          for (let i = candidate * candidate; i < 313; i += candidate) isComposite[i] = candidate;
          hash[primeCounter] = Math.pow(candidate, .5) * maxWord | 0;
          k[primeCounter++] = Math.pow(candidate, 1 / 3) * maxWord | 0;
        }
      }

      let bitLength = ascii.length * 8;
      const padded = ascii + "\x80" + "\x00".repeat((64 - ((ascii.length + 9) % 64)) % 64);
      for (let i = 0; i < padded.length; i++) {
        words[i >> 2] |= padded.charCodeAt(i) << ((3 - i) % 4) * 8;
      }
      words[words.length] = bitLength / maxWord | 0;
      words[words.length] = bitLength;

      for (let j = 0; j < words.length;) {
        const w = words.slice(j, j += 16);
        const oldHash = hash.slice(0);
        for (let i = 0; i < 64; i++) {
          const w15 = w[i - 15];
          const w2 = w[i - 2];
          const a = hash[0];
          const e = hash[4];
          const temp1 = hash[7]
            + (rightRotate(e, 6) ^ rightRotate(e, 11) ^ rightRotate(e, 25))
            + ((e & hash[5]) ^ ((~e) & hash[6]))
            + k[i]
            + (w[i] = i < 16 ? w[i] : (
              w[i - 16]
              + (rightRotate(w15, 7) ^ rightRotate(w15, 18) ^ (w15 >>> 3))
              + w[i - 7]
              + (rightRotate(w2, 17) ^ rightRotate(w2, 19) ^ (w2 >>> 10))
            ) | 0);
          const temp2 = (rightRotate(a, 2) ^ rightRotate(a, 13) ^ rightRotate(a, 22))
            + ((a & hash[1]) ^ (a & hash[2]) ^ (hash[1] & hash[2]));
          hash.pop();
          hash.unshift((temp1 + temp2) | 0);
          hash[4] = (hash[4] + temp1) | 0;
        }
        for (let i = 0; i < 8; i++) hash[i] = (hash[i] + oldHash[i]) | 0;
      }

      for (let i = 0; i < 8; i++) {
        for (let j = 3; j + 1; j--) {
          const byte = (hash[i] >> (j * 8)) & 255;
          result += (byte < 16 ? "0" : "") + byte.toString(16);
        }
      }
      return result;
    }

    document.getElementById("login-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const errEl = document.getElementById("login-error");
      const btnEl = document.getElementById("login-btn");
      errEl.style.display = "none";
      btnEl.disabled = true;
      btnEl.textContent = "Entrando...";

      const email = document.getElementById("login-user").value.trim();
      const pass = document.getElementById("login-pass").value;

      try {
        // Try Supabase Auth first
        await window.gdpAuth.signIn(email, pass);
        // Story 14.1: ensure syncUserId is set for Supabase-authenticated admin
        try {
          const emp = JSON.parse(localStorage.getItem('nexedu.empresa') || '{}');
          if (!emp.syncUserId) { emp.syncUserId = 'LARIUCCI'; localStorage.setItem('nexedu.empresa', JSON.stringify(emp)); }
        } catch(_) {}
        window.location.href = DASHBOARD_URL;
      } catch (authErr) {
        // Fallback to legacy auth (transition period)
        const hash = await sha256(pass);
        if (email === LEGACY_AUTH.user && hash === LEGACY_AUTH.passHash) {
          sessionStorage.setItem(LEGACY_AUTH.sessionKey, LEGACY_AUTH.passHash);
          // Story 14.1: Set consistent empresa_id for admin/gestor login
          try {
            const emp = JSON.parse(localStorage.getItem('nexedu.empresa') || '{}');
            emp.syncUserId = 'LARIUCCI';
            localStorage.setItem('nexedu.empresa', JSON.stringify(emp));
          } catch(_) {}
          window.location.href = DASHBOARD_URL;
        } else {
          errEl.textContent = authErr.message || "Email ou senha inválidos.";
          errEl.style.display = "block";
        }
      } finally {
        btnEl.disabled = false;
        btnEl.textContent = "Entrar";
      }
    });
  </script>
</body>
</html>
